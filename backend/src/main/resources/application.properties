# Database connection parameters.
# Defaults are suitable for local run; in Docker these values are overridden via env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lela_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lela_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lela_password}

# Explicit PostgreSQL dialect selection for stable SQL generation.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# For MVP speed we auto-create/adjust schema from entities.
spring.jpa.hibernate.ddl-auto=update

# Show generated SQL in console to simplify demo/debug.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Uniform server settings for easier frontend integration.
server.port=8080

# Include error message in responses during development.
server.error.include-message=always
